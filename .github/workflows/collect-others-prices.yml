name: Collect Others Prices

on:
  schedule:
    - cron: '17 * * * *'   # jede Stunde zur Minute 17 (UTC) - gleiches Timing wie Yahoo-Collector
  workflow_dispatch:        # manuell auslösbar für Tests

jobs:
  collect-others-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ODBC Driver 18
        run: |
          curl -sSL -O https://packages.microsoft.com/keys/microsoft.asc
          sudo apt-key add microsoft.asc
          curl -sSL -O https://packages.microsoft.com/config/ubuntu/22.04/prod.list
          sudo mv prod.list /etc/apt/sources.list.d/msprod.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install Python dependencies
        run: pip install pyodbc

      - name: Run collector
        env:
          SQL_SERVER: ${{ secrets.SQL_SERVER }}
          SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
          SQL_USER: ${{ secrets.SQL_USER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
        run: python collect_others_prices.py
