name: Verify Securities DB

on:
  workflow_dispatch:

jobs:
  verify-sql:
    runs-on: ubuntu-latest
    steps:
      - name: Install sqlcmd (mssql-tools18)
        run: |
          curl -sSL -O https://packages.microsoft.com/keys/microsoft.asc
          sudo apt-key add microsoft.asc
          curl -sSL -O https://packages.microsoft.com/config/ubuntu/22.04/prod.list
          sudo mv prod.list /etc/apt/sources.list.d/msprod.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev

      - name: List tables and row counts
        run: |
          /opt/mssql-tools18/bin/sqlcmd \
            -S "${{ secrets.SQL_SERVER }}" \
            -d "${{ secrets.SQL_DATABASE }}" \
            -U "${{ secrets.SQL_USER }}" \
            -P "${{ secrets.SQL_PASSWORD }}" \
            -C \
            -Q "SELECT t.name AS TableName, SUM(p.rows) AS RowCount FROM sys.tables t JOIN sys.partitions p ON t.object_id = p.object_id AND p.index_id IN (0,1) GROUP BY t.name ORDER BY t.name;"

      - name: Show security_parameters content
        run: |
          /opt/mssql-tools18/bin/sqlcmd \
            -S "${{ secrets.SQL_SERVER }}" \
            -d "${{ secrets.SQL_DATABASE }}" \
            -U "${{ secrets.SQL_USER }}" \
            -P "${{ secrets.SQL_PASSWORD }}" \
            -C \
            -Q "SELECT ParameterID, SecurityID, ParameterName, ParameterType, ParameterValue FROM security_parameters ORDER BY ParameterID;"
